<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gear — The Rusti Shack</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sand:    #f5e9d3;
      --ocean:   #2a7a8c;
      --coral:   #e07050;
      --drift:   #8b6f50;
      --white:   #ffffff;
      --dark:    #2c2c2c;
      --green:   #3a8c5c;
    }

    body { font-family: 'Lato', sans-serif; background: var(--sand); color: var(--dark); }

    /* ── NAV ── */
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2.5rem; background: var(--ocean);
      position: sticky; top: 0; z-index: 100;
    }
    nav .logo {
      font-family: 'Pacifico', cursive; font-size: 1.5rem;
      color: var(--white); text-decoration: none;
    }
    nav ul { list-style: none; display: flex; gap: 2rem; }
    nav ul a {
      color: var(--white); text-decoration: none; font-weight: 700;
      font-size: 0.9rem; letter-spacing: 0.05em; text-transform: uppercase;
      opacity: 0.85; transition: opacity 0.2s;
    }
    nav ul a:hover, nav ul a.active { opacity: 1; }
    @media (max-width: 640px) {
      nav { flex-wrap: wrap; justify-content: center; gap: 0.75rem; padding: 1rem 1.25rem; }
      nav .logo { flex: 0 0 100%; text-align: center; }
      nav ul { flex-wrap: wrap; justify-content: center; gap: 1.1rem; }
    }

    /* ── PAGE HEADER ── */
    .page-header {
      background: var(--ocean); color: var(--white);
      text-align: center; padding: 3rem 2rem 2.5rem;
    }
    .page-header h1 {
      font-family: 'Pacifico', cursive;
      font-size: clamp(2rem, 5vw, 3rem); margin-bottom: 0.5rem;
    }
    .page-header p { font-size: 1rem; font-weight: 300; opacity: 0.88; }

    /* ── LAYOUT ── */
    .gear-page { padding: 3.5rem 2rem 5rem; max-width: 1200px; margin: 0 auto; }

    .category-group { margin-bottom: 3.5rem; }
    .category-group:last-child { margin-bottom: 0; }

    .category-label {
      font-family: 'Pacifico', cursive; font-size: 1.5rem; color: var(--drift);
      margin-bottom: 1.2rem; padding-bottom: 0.6rem;
      border-bottom: 2px solid rgba(139,111,80,0.2);
    }

    /* ── PRODUCT CARDS ── */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1.4rem;
    }

    .card {
      background: var(--white); border-radius: 16px; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.07);
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column;
    }
    .card:hover { transform: translateY(-5px); box-shadow: 0 8px 28px rgba(0,0,0,0.13); }

    .card-photo {
      width: 100%; aspect-ratio: 4/3;
      background: var(--sand);
      display: flex; align-items: center; justify-content: center;
      font-size: 3rem; overflow: hidden;
    }
    .card-photo img {
      width: 100%; height: 100%; object-fit: cover;
      display: block; transition: transform 0.3s ease;
    }
    .card:hover .card-photo img { transform: scale(1.04); }

    .card-body { padding: 1rem; flex: 1; display: flex; flex-direction: column; gap: 0.5rem; }

    .card-name { font-size: 0.9rem; font-weight: 700; color: var(--dark); line-height: 1.3; }

    .card-pricing { display: flex; flex-direction: column; gap: 0.2rem; margin-top: auto; }

    .price-row { display: flex; align-items: center; gap: 0.4rem; font-size: 0.82rem; }
    .price-label { color: #999; font-weight: 400; }
    .price-value { font-weight: 700; color: var(--dark); }

    .badges { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.5rem; }

    .badge {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.04em;
      text-transform: uppercase; padding: 0.25rem 0.6rem; border-radius: 50px;
    }
    .badge-sale   { background: rgba(224,112,80,0.12); color: var(--coral); }
    .badge-rent   { background: rgba(42,122,140,0.12); color: var(--ocean); }

    /* ── CARD CURSOR ── */
    .card { cursor: pointer; }

    /* ── MODAL OVERLAY ── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0; z-index: 500;
      background: rgba(0,0,0,0.55);
      align-items: center; justify-content: center;
      padding: 1.5rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--white);
      border-radius: 20px;
      width: 100%; max-width: 860px;
      max-height: 90vh;
      overflow-y: auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      position: relative;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    /* ── MODAL IMAGES ── */
    .modal-images {
      background: var(--sand);
      display: flex; flex-direction: column;
      gap: 0.75rem;
      padding: 1.5rem;
      border-radius: 20px 0 0 20px;
    }
    .modal-img-studio {
      flex: 2;
      background: #e8dcc8;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 5rem;
      min-height: 220px;
      overflow: hidden;
    }
    .modal-img-studio img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .modal-img-lifestyle {
      flex: 1;
      background: #d9cbb5;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      min-height: 130px;
      overflow: hidden;
      position: relative;
    }
    .modal-img-lifestyle img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }
    .lifestyle-label {
      position: absolute; bottom: 0.5rem; left: 0.6rem;
      font-size: 0.65rem; font-weight: 700; letter-spacing: 0.06em;
      text-transform: uppercase; color: rgba(255,255,255,0.85);
      background: rgba(0,0,0,0.35); padding: 0.2rem 0.5rem; border-radius: 4px;
    }

    /* ── MODAL DETAILS ── */
    .modal-details {
      padding: 2rem 2rem 2rem 1.8rem;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .modal-category {
      font-size: 0.75rem; font-weight: 700; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--drift);
    }
    .modal-name {
      font-family: 'Pacifico', cursive;
      font-size: 1.5rem; color: var(--dark); line-height: 1.25;
    }
    .modal-sku { font-size: 0.75rem; color: #aaa; }
    .modal-divider { border: none; border-top: 1px solid #eee; }
    .modal-pricing { display: flex; flex-direction: column; gap: 0.4rem; }
    .modal-price-row {
      display: flex; align-items: baseline; gap: 0.6rem;
    }
    .modal-price-label { font-size: 0.8rem; color: #999; width: 48px; }
    .modal-price-value { font-size: 1.2rem; font-weight: 700; color: var(--dark); }
    .modal-price-sub { font-size: 0.75rem; color: #aaa; }
    .modal-badges { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .modal-variants {
      background: var(--sand); border-radius: 10px; padding: 0.9rem 1rem;
      font-size: 0.82rem; color: var(--drift);
    }
    .modal-variants strong { display: block; margin-bottom: 0.3rem; font-size: 0.75rem;
      text-transform: uppercase; letter-spacing: 0.06em; }

    /* ── CLOSE BUTTON ── */
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--dark); color: var(--white);
      border: none; cursor: pointer;
      font-size: 1.1rem; line-height: 1;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .modal-close:hover { background: var(--coral); }

    /* ── RESPONSIVE ── */
    @media (max-width: 620px) {
      .modal { grid-template-columns: 1fr; }
      .modal-images { border-radius: 20px 20px 0 0; }
      .modal-img-studio { min-height: 160px; }
    }

    /* ── MODAL ADD BUTTONS ── */
    .modal-actions { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.25rem; }
    .btn-add {
      flex: 1; padding: 0.7rem 1rem; border: none; border-radius: 50px;
      font-family: 'Lato', sans-serif; font-weight: 700; font-size: 0.85rem;
      letter-spacing: 0.05em; text-transform: uppercase; cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-add:active { transform: scale(0.97); }
    .btn-buy  { background: var(--coral); color: var(--white); }
    .btn-buy:hover  { background: #c85f40; }
    .btn-rent { background: var(--ocean); color: var(--white); }
    .btn-rent:hover { background: #21606e; }

    /* ── CART BUTTON IN NAV ── */
    .cart-btn {
      background: none; border: 2px solid rgba(255,255,255,0.5);
      color: var(--white); border-radius: 50px; text-decoration: none;
      padding: 0.35rem 0.9rem; font-family: 'Lato', sans-serif;
      font-weight: 700; font-size: 0.85rem; letter-spacing: 0.04em;
      display: flex; align-items: center; gap: 0.4rem;
      transition: border-color 0.2s, background 0.2s;
    }
    .cart-btn:hover { border-color: white; background: rgba(255,255,255,0.1); }
    .cart-count {
      background: var(--coral); color: var(--white);
      border-radius: 50%; min-width: 18px; height: 18px;
      font-size: 0.7rem; display: none;
      align-items: center; justify-content: center; padding: 0 3px;
    }
    .cart-count.has-items { display: flex; }

    /* ── VARIANT PICKER ── */
    .picker-label {
      font-size: 0.72rem; font-weight: 700; text-transform: uppercase;
      letter-spacing: 0.06em; color: var(--drift); margin-bottom: 0.35rem;
    }
    .picker-pills { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-bottom: 0.7rem; }
    .picker-pill {
      padding: 0.28rem 0.8rem; border-radius: 50px;
      border: 1.5px solid #ddd; background: none; cursor: pointer;
      font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .picker-pill:hover:not(:disabled) { border-color: var(--ocean); color: var(--ocean); }
    .picker-pill.selected { background: var(--ocean); border-color: var(--ocean); color: #fff; }
    .picker-pill:disabled { opacity: 0.28; cursor: not-allowed; pointer-events: none; }
    .modal-rental-note {
      font-size: 0.8rem; color: var(--ocean); font-style: italic;
      padding: 0.5rem 0.8rem; background: rgba(42,122,140,0.07);
      border-radius: 8px; line-height: 1.4;
    }
    .btn-add:disabled { opacity: 0.45; cursor: not-allowed; }

    /* ── FOOTER ── */
    footer {
      background: var(--dark); color: rgba(255,255,255,0.55);
      text-align: center; padding: 2rem; font-size: 0.85rem;
    }
    footer span { color: var(--coral); }
  </style>
</head>
<body>

  <nav>
    <a href="index.html" class="logo">The Rusti Shack</a>
    <ul>
      <li><a href="gear.html" class="active">Gear</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="find-us.html">Find Us</a></li>
    </ul>
    <a href="cart.html" class="cart-btn" id="cart-btn">
      🛒 Cart <span class="cart-count" id="cart-count"></span>
    </a>
  </nav>

  <div class="page-header">
    <h1>Our Gear</h1>
    <p>Everything you need for a perfect day on Apo Island.</p>
  </div>

  <main class="gear-page" id="gear-page">
    <p style="text-align:center;padding:3rem;color:#aaa">Loading gear…</p>

    <!-- content rendered by JS from Supabase -->
  </main>
  <footer>
    <p>© 2026 The Rusti Shack &nbsp;·&nbsp; Apo Island, Philippines &nbsp;·&nbsp; Made with <span>♥</span> by the sea</p>
  </footer>

  <!-- ── PRODUCT MODAL ── -->
  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">&#x2715;</button>

      <div class="modal-images">
        <div class="modal-img-studio" id="modal-studio"></div>
        <div class="modal-img-lifestyle" id="modal-lifestyle">
          <span class="lifestyle-label">Lifestyle</span>
        </div>
      </div>

      <div class="modal-details">
        <div class="modal-category" id="modal-category"></div>
        <div class="modal-name" id="modal-name"></div>
        <hr class="modal-divider" />
        <div class="modal-pricing" id="modal-pricing"></div>
        <div class="modal-badges" id="modal-badges"></div>
        <div id="modal-picker-wrap"></div>
        <div class="modal-rental-note" id="modal-rental-note" style="display:none">
          🏝️ Also available to rent in store on Apo Island.
        </div>
        <div class="modal-actions">
          <button class="btn-add btn-buy" id="modal-add-btn" disabled>Add to Cart</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ── SUPABASE ──────────────────────────────────────────────────
    var _db = supabase.createClient(
      'https://igfgyuuucaezuqtdvykl.supabase.co',
      'sb_publishable_DQ6TOH6FnupPHijXR6gplQ_nDNDSTxU'
    );

    var CATEGORY_ORDER = [
      { key: 'Beach Essentials', label: '🏖️ Beach Essentials', id: 'beach-essentials' },
      { key: 'Apparel',          label: '👕 Apparel',          id: 'apparel'          },
      { key: 'Snorkel & Dive',   label: '🤿 Snorkel & Dive',   id: 'snorkel-dive'    },
      { key: 'Surfing',          label: '🏄 Surfing',          id: 'surfing'         },
      { key: 'Fishing',          label: '🎣 Fishing',          id: 'fishing'         }
    ];

    // Loaded at boot, keyed by sku / parent_sku
    var _productsMap      = {};
    var _variantsByParent = {};

    // ── CARD BUILDER ──────────────────────────────────────────────
    function buildCard(p) {
      var canBuy  = p.availability === 'Both' || p.availability === 'Sale only';
      var canRent = p.availability === 'Both' || p.availability === 'Rental only';

      var card = document.createElement('div');
      card.className = 'card';
      card.dataset.sku       = p.sku;
      card.dataset.emoji     = p.emoji;
      if (p.studio_image)    card.dataset.studio    = p.studio_image;
      if (p.lifestyle_image) card.dataset.lifestyle = p.lifestyle_image;

      var photo = document.createElement('div');
      photo.className = 'card-photo';
      if (p.studio_image) {
        var img = document.createElement('img');
        img.alt = p.name; img.loading = 'lazy'; img.decoding = 'async'; img.src = p.studio_image;
        img.onerror = function() { photo.textContent = p.emoji; };
        photo.appendChild(img);
      } else {
        photo.textContent = p.emoji;
      }
      card.appendChild(photo);

      var body = document.createElement('div');
      body.className = 'card-body';

      var nameEl = document.createElement('div');
      nameEl.className = 'card-name';
      nameEl.textContent = p.name;
      body.appendChild(nameEl);

      var pricing = document.createElement('div');
      pricing.className = 'card-pricing';
      if (canBuy) {
        pricing.innerHTML += '<div class="price-row"><span class="price-label">Buy</span><span class="price-value">$' + Number(p.unit_price).toFixed(2) + '</span></div>';
      }
      if (canRent && p.rental_rate) {
        pricing.innerHTML += '<div class="price-row"><span class="price-label">Rent</span><span class="price-value">$' + Number(p.rental_rate).toFixed(2) + '/day</span></div>';
      }
      body.appendChild(pricing);

      var badges = document.createElement('div');
      badges.className = 'badges';
      if (canBuy)  badges.innerHTML += '<span class="badge badge-sale">For Sale</span>';
      if (canRent) badges.innerHTML += '<span class="badge badge-rent">For Rent</span>';
      body.appendChild(badges);

      card.appendChild(body);
      return card;
    }

    // ── DATA LOADING ──────────────────────────────────────────────
    function renderProducts() {
      var gearPage = document.getElementById('gear-page');
      gearPage.innerHTML = '<p style="text-align:center;padding:3rem;color:#aaa">Loading gear…</p>';

      Promise.all([
        _db.from('products').select('*').order('sku'),
        _db.from('product_variants').select('*')
      ]).then(function(results) {
        var prodResult = results[0];
        var varResult  = results[1];

        if (prodResult.error || !prodResult.data) {
          gearPage.innerHTML = '<p style="text-align:center;padding:3rem;color:#aaa">Could not load products. Please refresh.</p>';
          return;
        }

        _productsMap = {};
        prodResult.data.forEach(function(p) { _productsMap[p.sku] = p; });

        _variantsByParent = {};
        if (varResult.data) {
          varResult.data.forEach(function(v) {
            if (!_variantsByParent[v.parent_sku]) _variantsByParent[v.parent_sku] = [];
            _variantsByParent[v.parent_sku].push(v);
          });
        }

        var byCategory = {};
        prodResult.data.forEach(function(p) {
          if (!byCategory[p.category]) byCategory[p.category] = [];
          byCategory[p.category].push(p);
        });

        gearPage.innerHTML = '';
        CATEGORY_ORDER.forEach(function(cat) {
          var items = byCategory[cat.key];
          if (!items || !items.length) return;

          var group = document.createElement('div');
          group.className = 'category-group'; group.id = cat.id;

          var labelEl = document.createElement('div');
          labelEl.className = 'category-label'; labelEl.textContent = cat.label;
          group.appendChild(labelEl);

          var cardsEl = document.createElement('div');
          cardsEl.className = 'cards';
          items.forEach(function(p) { cardsEl.appendChild(buildCard(p)); });
          group.appendChild(cardsEl);
          gearPage.appendChild(group);
        });

        updateCartCount();
      });
    }

    // ── CART ──────────────────────────────────────────────────────
    function getCart()    { return JSON.parse(localStorage.getItem('rustiCart') || '[]'); }
    function saveCart(c)  { localStorage.setItem('rustiCart', JSON.stringify(c)); }

    function updateCartCount() {
      var cart  = getCart();
      var total = cart.reduce(function(s, i) { return s + i.qty; }, 0);
      var el    = document.getElementById('cart-count');
      if (!el) return;
      el.textContent = total || '';
      el.classList.toggle('has-items', total > 0);
    }

    function addToCart(sku, name, variantLabel, emoji, studioImage, price) {
      var cart     = getCart();
      var existing = cart.find(function(i) { return i.sku === sku; });
      if (existing) {
        existing.qty++;
      } else {
        cart.push({ sku: sku, name: name, variantLabel: variantLabel,
                    emoji: emoji, studioImage: studioImage, price: price, qty: 1 });
      }
      saveCart(cart);
      updateCartCount();

      // Flash "Added!" then close modal
      var btn = document.getElementById('modal-add-btn');
      if (btn) {
        var orig = btn.textContent;
        btn.textContent = '✓ Added to Cart!';
        btn.disabled = true;
        setTimeout(function() { closeModal(); btn.textContent = orig; btn.disabled = false; }, 900);
      } else {
        closeModal();
      }
    }

    // ── VARIANT PICKER ────────────────────────────────────────────
    var _currentProduct  = null;
    var _currentVariants = [];
    var _dims            = [];
    var _selectedOpts    = {};

    var GENDER_LABELS = { M: "Men's", W: "Women's", U: 'Kids / Unisex' };

    function uniqueVals(arr, key) {
      var seen = {}, out = [];
      arr.forEach(function(x) {
        if (x[key] !== null && x[key] !== undefined && !seen[x[key]]) {
          seen[x[key]] = true; out.push(x[key]);
        }
      });
      return out;
    }

    function getVariantDimensions(variants) {
      var allSizes    = uniqueVals(variants, 'size');
      var allColors   = uniqueVals(variants, 'color');
      var allGenders  = uniqueVals(variants, 'gender');
      var nonUGenders = allGenders.filter(function(g) { return g !== 'U'; });

      var dims = [];
      if (allSizes.length > 1) dims.push({ key: 'size', label: 'Size', opts: allSizes });

      if (allColors.length > 1 && nonUGenders.length > 0) {
        // Check if each color maps to exactly one gender (correlated → skip gender picker)
        var correlated = allColors.every(function(c) {
          return uniqueVals(variants.filter(function(v) { return v.color === c; }), 'gender').length === 1;
        });
        dims.push({ key: 'color', label: 'Color', opts: allColors });
        if (!correlated) {
          dims.push({ key: 'gender', label: 'For', opts: allGenders, labelMap: GENDER_LABELS });
        }
      } else {
        if (allColors.length > 1)  dims.push({ key: 'color',  label: 'Color', opts: allColors });
        if (allGenders.length > 1) dims.push({ key: 'gender', label: 'For',   opts: allGenders, labelMap: GENDER_LABELS });
      }
      return dims;
    }

    function getPossibleVals(dimKey) {
      var otherDims = _dims.filter(function(d) { return d.key !== dimKey; });
      var filtered  = _currentVariants.filter(function(v) {
        return otherDims.every(function(d) {
          return !_selectedOpts[d.key] || v[d.key] === _selectedOpts[d.key];
        });
      });
      return uniqueVals(filtered, dimKey);
    }

    function findSelectedVariant() {
      var allSelected = _dims.every(function(d) { return _selectedOpts[d.key]; });
      if (!allSelected) return null;
      return _currentVariants.find(function(v) {
        return _dims.every(function(d) { return v[d.key] === _selectedOpts[d.key]; });
      }) || null;
    }

    function buildVariantLabel(v) {
      return _dims.map(function(d) {
        var val = v[d.key];
        return d.labelMap ? (d.labelMap[val] || val) : val;
      }).filter(Boolean).join(' / ');
    }

    function renderVariantPicker() {
      var container = document.getElementById('modal-picker-wrap');
      if (!container) return;
      container.innerHTML = '';

      _dims.forEach(function(dim) {
        var possible = getPossibleVals(dim.key);
        var selected = _selectedOpts[dim.key];

        var labelEl = document.createElement('div');
        labelEl.className = 'picker-label';
        labelEl.textContent = dim.label + (selected ? ': ' + (dim.labelMap ? (dim.labelMap[selected] || selected) : selected) : '');
        container.appendChild(labelEl);

        var pillsEl = document.createElement('div');
        pillsEl.className = 'picker-pills';
        dim.opts.forEach(function(val) {
          var pill = document.createElement('button');
          pill.className = 'picker-pill' + (selected === val ? ' selected' : '');
          pill.textContent = dim.labelMap ? (dim.labelMap[val] || val) : val;
          pill.disabled = possible.indexOf(val) < 0;
          pill.addEventListener('click', function() { pickOpt(dim.key, val); });
          pillsEl.appendChild(pill);
        });
        container.appendChild(pillsEl);
      });

      updateAddBtn();
    }

    function pickOpt(key, val) {
      _selectedOpts[key] = (_selectedOpts[key] === val) ? null : val;
      renderVariantPicker();
    }

    function updateAddBtn() {
      var btn = document.getElementById('modal-add-btn');
      if (!btn || !_currentProduct) return;
      var p       = _currentProduct;
      var canBuy  = p.availability === 'Both' || p.availability === 'Sale only';

      if (!canBuy) { btn.style.display = 'none'; return; }
      btn.style.display = 'block';

      if (_dims.length > 0) {
        var variant = findSelectedVariant();
        if (variant) {
          btn.disabled = false;
          btn.textContent = 'Add to Cart — $' + Number(variant.unit_price).toFixed(2);
          btn.dataset.readySku   = variant.sku;
          btn.dataset.readyPrice = variant.unit_price;
          btn.dataset.readyLabel = buildVariantLabel(variant);
        } else {
          btn.disabled = true;
          btn.textContent = 'Add to Cart';
          delete btn.dataset.readySku;
        }
      } else {
        btn.disabled = false;
        btn.textContent = 'Add to Cart — $' + Number(p.unit_price).toFixed(2);
        btn.dataset.readySku   = p.sku;
        btn.dataset.readyPrice = p.unit_price;
        btn.dataset.readyLabel = '';
      }
    }

    // ── PRODUCT MODAL ─────────────────────────────────────────────
    var overlay  = document.getElementById('modal-overlay');
    var btnClose = document.getElementById('modal-close');

    function openModal(card) {
      var sku          = card.dataset.sku;
      var emoji        = card.dataset.emoji;
      var name         = card.querySelector('.card-name').textContent.trim();
      var category     = card.closest('.category-group').querySelector('.category-label').textContent.trim();
      var studioSrc    = card.dataset.studio    || null;
      var lifestyleSrc = card.dataset.lifestyle || null;

      var product  = _productsMap[sku] || null;
      var variants = _variantsByParent[sku] || [];

      _currentProduct  = product;
      _currentVariants = variants;
      _selectedOpts    = {};
      _dims            = variants.length > 0 ? getVariantDimensions(variants) : [];

      // Studio image
      var studioEl = document.getElementById('modal-studio');
      studioEl.innerHTML = studioSrc
        ? '<img src="' + studioSrc + '" alt="' + name + '" />'
        : emoji;

      // Lifestyle image
      var lifestyleEl = document.getElementById('modal-lifestyle');
      lifestyleEl.innerHTML = lifestyleSrc
        ? '<img src="' + lifestyleSrc + '" alt="' + name + ' lifestyle" /><span class="lifestyle-label">Lifestyle</span>'
        : '<span style="opacity:0.3;font-size:2.2rem">' + emoji + '</span><span class="lifestyle-label">Lifestyle</span>';

      document.getElementById('modal-category').textContent = category;
      document.getElementById('modal-name').textContent     = name;

      // Pricing
      var pricingEl = document.getElementById('modal-pricing');
      pricingEl.innerHTML = '';
      if (product) {
        var canBuy  = product.availability === 'Both' || product.availability === 'Sale only';
        var canRent = product.availability === 'Both' || product.availability === 'Rental only';
        var priceStr = variants.length > 0
          ? 'from $' + Number(product.unit_price).toFixed(2)
          : '$' + Number(product.unit_price).toFixed(2);
        if (canBuy) {
          pricingEl.innerHTML += '<div class="modal-price-row"><span class="modal-price-label">Buy</span><span class="modal-price-value">' + priceStr + '</span></div>';
        }
        if (canRent && product.rental_rate) {
          pricingEl.innerHTML += '<div class="modal-price-row"><span class="modal-price-label">Rent</span><span class="modal-price-value">$' + Number(product.rental_rate).toFixed(2) + '</span><span class="modal-price-sub">per day</span></div>';
        }
      }

      // Badges
      var badgesEl = document.getElementById('modal-badges');
      badgesEl.innerHTML = '';
      card.querySelectorAll('.badge').forEach(function(b) {
        var cls = b.classList.contains('badge-sale') ? 'badge-sale' : 'badge-rent';
        badgesEl.innerHTML += '<span class="badge ' + cls + '">' + b.textContent + '</span>';
      });

      // In-store rental note (availability = 'Both')
      var noteEl = document.getElementById('modal-rental-note');
      if (noteEl) noteEl.style.display = (product && product.availability === 'Both') ? 'block' : 'none';

      // Variant pickers
      renderVariantPicker();

      overlay.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      overlay.classList.remove('open');
      document.body.style.overflow = '';
    }

    // Card clicks — event delegation (cards are rendered dynamically)
    document.getElementById('gear-page').addEventListener('click', function(e) {
      var card = e.target.closest('.card');
      if (card) openModal(card);
    });

    btnClose.addEventListener('click', closeModal);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeModal(); });
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeModal(); });

    // Add to Cart button
    document.getElementById('modal-add-btn').addEventListener('click', function() {
      if (this.disabled || !this.dataset.readySku) return;
      var p = _currentProduct;
      addToCart(
        this.dataset.readySku,
        p.name,
        this.dataset.readyLabel || '',
        p.emoji,
        p.studio_image || null,
        parseFloat(this.dataset.readyPrice)
      );
    });

    renderProducts();
  </script>

</body>
</html>
